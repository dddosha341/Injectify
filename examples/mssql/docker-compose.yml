services:
  api:
    build:
      context: ../..
      dockerfile: examples/mssql/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mssql://sa:YourPassword123!@mssql:1433/demo
      INJECTIFY_BASE_URL: http://localhost:8000
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
